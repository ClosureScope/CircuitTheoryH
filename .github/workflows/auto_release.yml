name: Auto-Compile and Release PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Install Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra
          mkdir -p ~/.local/share/fonts
          wget -q -P ~/.local/share/fonts/ \
            "https://github.com/lxgw/LxgwWenKai/releases/latest/download/LXGWWenKai-Regular.ttf"
          wget -q -O /tmp/Libertinus.tar.xz \
            "https://github.com/alerque/libertinus/releases/download/v7.040/Libertinus-7.040.tar.xz"
          tar -xJf /tmp/Libertinus.tar.xz -C /tmp/ \
            "Libertinus-7.040/static/OTF/LibertinusSerif-Regular.otf"
          cp /tmp/Libertinus-7.040/static/OTF/LibertinusSerif-Regular.otf ~/.local/share/fonts/
          fc-cache -fv

      - name: Compile Typst to PDF
        run: typst compile notebook.typ

      - name: Generate Automated Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Notes"
          body: |
            This is an automated build of the latest notes.
            Last updated: ${{ github.event.head_commit.timestamp }}
          files: |
            *.pdf
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}